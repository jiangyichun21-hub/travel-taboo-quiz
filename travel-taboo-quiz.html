{icon:"💊",title:"药品",list:["肠胃药：巴西饮食油腻，水土不服常见。", "感冒药：温差大容易感冒。", "创可贴：步行多，防磨脚。", "黄热病疫苗：如计划前往亚马逊地区，建议提前接种黄热病疫苗并携带疫苗证书。"]},
{icon:"⚠️",title:"注意事项与禁忌",list:["安全提示：巴西治安较差，尤其是里约、圣保罗等大城市。避免夜间单独出行，不携带大量现金和贵重物品，不露富。旅游区域相对安全但仍需警惕。", "饮用水：建议购买瓶装水，不直接饮用自来水。", "禁止携带：新鲜水果、蔬菜、肉类制品、种子等。", "紧急电话：190（警察）、192（急救）、193（火警）。"]}
]},
  "澳大利亚":{sections:[
{icon:"🛂",title:"证件与签证",list:["护照：有效期需覆盖整个行程且回国后仍超半年，建议复印2份+电子版备份。", "签证：电子签建议打印纸质版备用，入境时可能需要查看。", "驾照+翻译件：如需自驾，需准备NAATI官方认证的英文翻译件。", "黑色签字笔：飞机上填写入境卡时用。"]},
{icon:"💰",title:"资金与支付",list:["信用卡：带芯片的Visa或Mastercard，澳洲刷卡非常方便，磁条卡可能无法使用。", "现金：准备200-500澳元小额现金即可，大部分地方都能刷卡，硬币回国前花掉。", "小费文化：澳大利亚没有强制小费文化，餐厅一般不收小费，优质服务可给10%。"]},
{icon:"🚄",title:"交通出行",list:["租车：澳大利亚地域广阔，自驾是最方便的出行方式。澳大利亚靠左行驶。", "Uber：各大城市可用。", "Google Maps：导航必备。", "公共交通：悉尼、墨尔本等城市有火车、公交、轮渡，使用Opal卡（悉尼）或Myki卡（墨尔本）。"]},
{icon:"📱",title:"通讯与APP",list:["电话卡：提前在某宝购买澳洲流量卡（Telstra/Optus/Vodafone），落地激活比机场买便宜。", "TripAdvisor：找餐厅和景点。"]},
{icon:"🔌",title:"电子设备",list:["转换插头：澳洲是Type I三扁插头（三孔扁形），国内两孔插头需转换。", "插线板：建议带一个三孔插排，可同时给多台设备充电，比单个转换器更实用。", "充电宝：容量≤20000mAh可随身携带，国际航班一般不查3C认证。", "数据线：多备几根，飞机上USB口有时不稳定。", "车载充电器：自驾必备。"]},
{icon:"👕",title:"衣物与防晒",list:["防晒装备：防晒霜SPF50+、墨镜、遮阳帽、防晒衣，澳洲紫外线极强，物理防晒很重要。", "分层穿衣：洋葱式穿法，短袖+外套+防风衣，澳洲昼夜温差大，尤其墨尔本\"一天四季\"。", "舒适运动鞋：适合城市暴走或徒步。", "泳衣+潜水袜：海边浮潜必备，大堡礁等景点会用到。", "保暖衣物：如7-8月冬季前往，需带轻薄羽绒服、保暖内衣、围巾手套，当地购买性价比低。"]},
{icon:"🧴",title:"洗漱与日用品",list:["牙刷牙膏拖鞋：很多酒店民宿不提供，需自备或向前台索要。", "防晒霜：SPF50+防水型，超过100ml需托运。", "一次性用品：浴巾、马桶垫、洗脸巾，提升旅途卫生舒适度。", "护肤小样：水乳面霜面膜等带旅行装即可，澳洲买也方便但国内带小样省空间。", "驱蚊液：郊区或雨林地区蚊虫较多，需要备着。"]},
{icon:"💊",title:"药品",list:["常用药：感冒药、退烧药、肠胃药、晕车药、创口贴、碘伏棉签等日常用药。", "药品申报：所有药品需在入境卡申报，保留原包装和英文说明书，可提前做中英文对照清单。", "个人处方药：带足量并保留原包装+英文处方。"]},
{icon:"⚠️",title:"注意事项与禁忌",list:["入境申报：严禁携带新鲜水果、蔬菜、肉类、蛋类等食品，不确定是否需要申报的物品一律申报，申报了最多没收，未申报可能被罚款甚至遣返。", "防晒：澳洲紫外线强度远超国内，即使阴天也要涂防晒霜。", "季节相反：澳洲位于南半球，1-2月是夏季，7-8月是冬季，打包前确认目的地季节。", "野生动物：不要随意接触野生动物（袋鼠、考拉等），部分动物有攻击性。", "海滩安全：只在有救生员的海滩游泳，注意离岸流和水母（夏季北部海域有箱型水母）。", "紧急电话：000（警察、急救、火警通用）。", "水杯/保温杯：澳洲饮用水较贵，酒店可接水，自带杯子环保省钱。", "折叠餐具：筷子勺子，有中国胃的话很实用。", "收纳袋：分类存放衣物和电子产品，方便整理。", "密码锁：住青旅时锁柜子用。"]}
]},
  "加拿大":{sections:[
{icon:"🛂",title:"证件与签证",list:["护照：有效期需超6个月+有效签证/eTA+入境批文（留学带Study Letter，移民带COPR），全部随身带，别托运。", "辅助证明：往返机票行程单、酒店预订单或租房合同、资金证明以备海关查验。", "电子备份：建议手机相册+云端（如邮箱）各存一份电子版，纸质版单独放文件袋。", "入境申报：出发前72小时内完成ArriveCAN填报，获取回执是快速通关核心凭证。"]},
{icon:"💰",title:"资金与支付",list:["现金：携带1万加币（或等值外币）以上需申报，否则可能被没收并罚款；建议带少量现金（100-300加币）应急。", "信用卡：办理一张可以国际支付的信用卡（Visa/Master卡）。"]},
{icon:"🚄",title:"交通出行",list:["Google Maps：导航必备。", "Uber：各大城市可用。"]},
{icon:"📱",title:"通讯与APP",list:["电话卡：提前买好加拿大本地流量卡或开通国际漫游。"]},
{icon:"🔌",title:"电子设备",list:["转换插头：加拿大标准110V电压，Type A/B插座（两扁插或三扁插），多备几个转换插头+排插。", "必备设备：手机充电器、电脑/平板及充电线、充电宝（需随身携带，100Wh以内）。", "其他配件：U盘/移动硬盘、耳机、取卡针。"]},
{icon:"👕",title:"衣物与防晒",list:["冬季装备：羽绒服/冲锋衣（冬季必备，加拿大冬天可达零下二三十度）、保暖内衣、毛衣、手套、帽子、围巾。", "日常衣物：T恤、衬衫、牛仔裤、外套（风衣、夹克等）、内衣内裤、袜子。", "鞋子：运动鞋、皮鞋（正式场合用）、拖鞋（一双凉拖、一双棉拖）。", "注意：加拿大室内暖气很足，建议穿分层衣物，方便穿脱；不用带太多厚重室内衣物，当地可购买。"]},
{icon:"🧴",title:"洗漱与日用品",list:["洗漱用品：旅行装的洗发水、沐浴露、牙刷牙膏（部分酒店可能不提供拖鞋，建议带一双轻便的）。", "护肤美妆：护肤品、化妆品（单瓶容积不超过100ml，需装透明密封袋）、防晒霜、润唇膏。", "其他用品：雨伞（加拿大雨季较长）、保温杯、衣架（可带几个折叠衣架）、指甲刀套装（托运）。", "床上用品：可带一套床单被罩应急（注意尺寸：加拿大Twin/Queen常见），被子可到当地购买。"]},
{icon:"💊",title:"药品",list:["常备药：感冒药、肠胃药、止痛药、创可贴、晕车药、退烧药（布洛芬）。", "处方药：必须携带医生处方单（中英双语最好），且总量不超过90天，保留原包装和说明书。", "个人护理：体温计、隐形眼镜护理液（小瓶装）、眼镜/隐形眼镜（配一副备用，加拿大验光贵）。", "违禁提醒：含麻黄碱、吗啡成分的药物（如白加黑、甘草片）、中药材（如鹿茸、虫草）严禁携带。"]},
{icon:"⚠️",title:"注意事项与禁忌",list:["禁带食品：绝对不要带肉干、火腿肠、自热火锅、新鲜水果蔬菜、种子、带壳坚果，哪怕是包装零食也建议主动申报。", "免税额度：香烟限200支，酒类限1.14升烈酒或1.5升葡萄酒，超额需缴税。", "落地流程：下飞机后→自助机器申报（支持中文界面）→打印白色回执小票→递交材料接受海关问询→取行李→无申报走绿通道。", "海关问答：核心高频问题包括出行目的、停留时长、是否有返程机票、携带现金金额等，英文薄弱可提前手写答案备用。", "行李限制：托运行李每件一般不超过23-32公斤，随身行李一般不超过5-10公斤，提前确认所乘航班行李政策。", "安全提示：贵重物品尽量随身携带，不要托运；提前将行程告知国内亲友，考虑购买国际旅行保险。"]}
]},
  "阿根廷":{sections:[
{icon:"🛂",title:"证件与签证",list:["护照：确保护照有效期6个月以上。", "签证：持有有效美国B1/B2签证可免签阿根廷（2025年7月22日起政策），但建议提前确认最新入境要求，部分航空公司可能要求出示医疗保险证明。", "复印件：护照、签证页复印2份分开放，电子版存手机备用。"]},
{icon:"💰",title:"资金与支付",list:["现金与换汇：携带美元现金（小额面额更佳），当地可兑换比索。汇率参考：美元:比索约1:1300-1400（黑市/银行/Western Union等渠道略有差异）。", "信用卡：Visa外卡汇率较好，很多餐厅、商店可直接刷卡消费，部分场所接受美元现金结账。"]},
{icon:"🚄",title:"交通出行",list:["Google Maps：导航。", "Uber：打车。"]},
{icon:"📱",title:"通讯与APP",list:["通讯工具：提前买当地流量卡或开通国际漫游，下载离线地图和西语翻译APP，偏远地区信号较弱。"]},
{icon:"🔌",title:"电子设备",list:["转换插头：阿根廷用两孔斜插或欧标两圆插头（Type I），国内电器需适配转换器。", "充电宝：容量不超2万毫安，长途车程多很耗电。"]},
{icon:"👕",title:"衣物与防晒",list:["分层穿衣法：内层打底、中层保暖、外层防风，南北温差大（布宜诺斯艾利斯夏季30℃，乌斯怀亚仅5℃）。", "防晒装备：高倍防晒霜（SPF50+）、遮阳帽、太阳镜必备，日均日照超11小时，紫外线超强。", "徒步鞋：日常逛街和轻度徒步穿舒适鞋，若去菲茨罗伊山或冰川徒步，建议专业防水徒步鞋。", "冲锋衣裤：巴塔哥尼亚地区风大，防风外套必带；乌斯怀亚需加绒外套。"]},
{icon:"🧴",title:"洗漱与日用品",list:["洗漱用品：部分酒店不提供牙具、拖鞋，自备更环保。"]},
{icon:"💊",title:"药品",list:["肠胃药：当地饮食偏酸重，备肠胃药应对水土不服。", "防蚊喷雾：选含DEET成分，尤其计划去亚马逊周边或雨林区域。", "应急药品：创可贴、感冒药、晕车贴、个人常用药，偏远地区药品难买。", "晒后修复：当地药房价格较贵，建议自备。"]},
{icon:"⚠️",title:"注意事项与禁忌",list:["随身小包：放证件、现金、手机等贵重物品，布宜诺斯艾利斯需注意防盗。", "密封袋：保护电子设备，伊瓜苏瀑布景区水雾大。", "笔：乌斯怀亚最南端邮局写明信片可用。"]}
]},
  "智利":{sections:[
{icon:"🛂",title:"证件与签证",list:["护照：确保护照有效期6个月以上。", "签证：持有有效美/加签证可免签入境，停留不超过90天，否则需提前申请智利旅游签。", "证件备份：护照、签证页复印2份+电子版备份，与原件分开存放。", "PDI入境卡：入境时填写并保存好（需拍照记录），出境时会用到。"]},
{icon:"💰",title:"资金与支付",list:["货币：建议带美元现金（崭新纸币）到当地换智利比索，大部分商户支持Visa/Mastercard信用卡。", "隐形钱包：放护照、大额现金、信用卡，日常用少量现金即可。"]},
{icon:"🚄",title:"交通出行",list:["交通：机场打车用Uber/Didi，避免黑出租；市区地铁办卡需现金。", "电话卡：推荐WOM卡（约50RMB/50G/30天），安卓手机开通更顺利。"]},
{icon:"📱",title:"通讯与APP",list:["离线地图：提前下载Google Maps离线地图包，很多地区无信号。"]},
{icon:"🔌",title:"电子设备",list:["转换插头：C型/F型欧标两孔插头，电压220V，建议带2个万用转换插头。", "充电宝：大容量充电宝必备，部分偏远地区信号差耗电极快。", "相机及配件：多备存储卡、充电器，拍星空银河很值得。"]},
{icon:"👕",title:"衣物与防晒",list:["分层穿衣法：智利温差极大，早晚可能需要厚外套，中午可能只需短袖。", "必备单品：轻便羽绒服/冲锋衣、速干衣裤、保暖内衣、羊毛袜、遮阳帽、墨镜。", "徒步装备：如去百内国家公园等户外区域，需防水登山鞋、雨衣、头巾。", "泳衣：泡温泉或海边行程会用到。"]},
{icon:"🧴",title:"洗漱与日用品",list:["洗漱用品：牙刷、牙膏、洗发水、沐浴露，很多酒店不提供一次性用品。", "折叠衣架：长时间旅行需要洗衣服。", "便携烧水壶：中国胃必备，酒店水壶卫生情况不明。", "阻门器：晚上住宿放在门口增加安全感。", "一次性拖鞋/马桶套：长途飞行和住酒店都用得上。"]},
{icon:"💊",title:"药品",list:["常用药：感冒药、退烧药、止泻药、止痛药、抗过敏药。", "高原反应：如去北部高原地区，可备Sorojchi pills或红景天。", "防蚊液：含DEET成分的驱蚊液，雨林区域蚊虫较多。", "防晒用品：高倍数防晒霜、润唇膏，南美紫外线极强。"]},
{icon:"⚠️",title:"注意事项与禁忌",list:["长途飞行好物：颈枕+腰靠（30多小时飞行必备，选充气款更省空间）、蒸汽眼罩+一次性眼药水（缓解飞行干涩）、保湿面膜+护手霜（飞机上非常干燥）、耳塞+降噪耳机（休息神器）、小零食（飞机餐可能不合胃口，带点榨菜、老干妈等下饭酱）。", "防盗：不要在路上玩手机，等红灯关车窗，车内不放贵重物品。", "住宿区域：圣地亚哥建议选择拉斯孔德斯区（Las Condes）等安全区域。"]}
]},
  "古巴":{sections:[
{icon:"🛂",title:"证件与签证",list:["护照：确保护照有效期在6个月以上。", "古巴旅游卡/签证：中国公民持普通护照免签停留不超过90天，但需提前填写电子入境表（dviajeros.mitrans.gob.cu），生成二维码截图或打印保存。", "往返机票行程单：打印纸质版，入关时可能需要查验。", "酒店订单确认单：覆盖全部停留日期，建议打印备份。", "旅行保险单：建议提前购买，覆盖医疗和意外情况。", "证件复印件：护照首页复印两份分开存放，备几张证件照以防万一。"]},
{icon:"💰",title:"资金与支付",list:["美元现金：带新钞无折痕的小面额美元（1元、5元、10元），用于小费和小额支付。", "换汇建议：不要机场换汇，可在民宿老板或当地商店换比索，汇率约1:280-320。", "信用卡：基本无法使用，尤其是美国发行的卡，现金是主流支付方式。", "随身钱袋：比索面值大，携带较重，用贴身小包装钱更安全。"]},
{icon:"🚄",title:"交通出行",list:["正规交通：认准黄色国营出租车，黑车别坐，让民宿老板预约接送更靠谱。", "Google Maps：离线地图下载好，网络不稳定时用。"]},
{icon:"📱",title:"通讯与APP",list:["电话卡：安卓手机可买当地电话卡作热点，苹果手机在古巴被禁用热点分享功能。", "西班牙语翻译软件：提前下载离线包，当地人英语普及率有限。"]},
{icon:"🔌",title:"电子设备",list:["转换插头：美标两脚圆头转换器（欧标），电压220V，部分插座可直接插但建议备用。", "充电宝：很多地方信号弱且充电不便，必备大容量充电宝。", "多口充电器：可同时充多个设备。", "相机及备用电池：复古街景很出片，多备电池。"]},
{icon:"👕",title:"衣物与防晒",list:["夏装速干衣裤：气候湿热类似广东，洗后易干。", "薄外套长裤：早晚温差大，飞机上和空调房需要。", "防晒衣+遮阳帽+墨镜：海边和城市游览必备，哈瓦那风大帽子易吹飞。", "泳衣：巴拉德罗海滩必穿。", "厚底舒适走路鞋：老城区石板路多，需要长时间步行。", "正装一件：部分高档餐厅有着装要求。"]},
{icon:"🧴",title:"洗漱与日用品",list:["牙刷牙膏毛巾：四星酒店和民宿大多不提供。", "洗发水沐浴露：小瓶装分装携带。", "抽纸和湿巾：大包+小包多带，当地缺乏卫生用品。", "卫生巾：当地买不到合适品牌，需自备足量。", "便携热水壶：折叠式更方便，当地难买到烧水壶。", "晾衣绳：湿热天气衣服不易干，部分民宿不提供洗衣服务。", "塑料拖鞋：酒店可能不提供。"]},
{icon:"💊",title:"药品",list:["肠胃药：防止水土不服和饮食不适。", "防蚊虫叮咬药：驱蚊水、清凉油、风油精，蚊子较多。", "消炎退烧药：临时应对发烧感冒，当地买药非常困难。", "过敏药：根据个人体质准备。", "创可贴：日常小伤口处理。", "高倍防晒霜：加勒比太阳很强，容易晒伤蜕皮。", "个人常用药：如有慢性病请带足量。"]},
{icon:"⚠️",title:"注意事项与禁忌",list:["食品与水：泡面和小零食（当地食物普遍偏咸且选择少，自带下饭调料包、榨菜等）、坚果巧克力牛肉干（长途飞行和外出时补充能量）、瓶装水（自备一两瓶1.5L水，当地水质不好避免直接饮用）、运动水壶（可重复使用，出门随身携带）。", "电蚊拍：折叠式便携，当地蚊虫较多花露水效果有限。", "吹风筒：部分住宿不提供。", "小礼品：笔、本子、耳机等小物件，送当地人或给小费都受欢迎。", "文件袋：存放所有行程单、行李托运单、酒店订单，离境时可能被查验。", "安全提示：结伴出行、避免夜间单独出行、不穿戴名贵服饰、妥善保管护照和贵重物品、街上喊money的别对视、主动带路的可能收费、只去有救生员看管的海滩游泳。"]}
]},
  "秘鲁":{sections:[
{icon:"🛂",title:"证件与签证",list:["护照：有效期需6个月以上，建议复印2份并保存电子备份。", "签证：中国护照持有效美国签证可免签入境秘鲁（停留不超过180天）。", "保险单：国际旅行险建议提前购买，确认是否包含高原医疗救援。"]},
{icon:"💰",title:"资金与支付",list:["现金：带美金到当地换秘鲁索尔，利马汇率较好，小城镇多收现金。建议在利马市区换汇（机场汇率较差）。小摊、厕所、打车等多需现金，备些零钱。", "信用卡：Visa/Master在大城市通用，备一张银联卡应急。部分小店只收现金，且刷卡可能有手续费。"]},
{icon:"🚄",title:"交通出行",list:["打车软件：Uber和Didi都用，但Didi可能需要现金，司机不好找零。", "Google Maps：导航。"]},
{icon:"📱",title:"通讯与APP",list:["当地SIM卡/eSIM：落地办Claro信号较好，山区覆盖更稳。漫游信号差。", "翻译App：下载西班牙语离线包，乡村地区英语不普及。", "WhatsApp：旅行团和酒店常用此沟通。"]},
{icon:"🔌",title:"电子设备",list:["插头转换器：秘鲁使用A/B/C型插座，电压220V。美标两孔插头通用，三孔需要转换器。", "移动电源：夜巴、徒步时无处充电。", "头灯：营地照明有限，清晨出发也用得上。", "防水袋：保护电子设备，雨林/船行时用。"]},
{icon:"👕",title:"衣物与防晒",list:["分层穿搭：高原地区温差极大，采用\"速干衣+抓绒/羽绒+冲锋衣\"三层穿法，方便随时增减。", "防水外套：雨季（11月-次年3月）必备，马丘比丘景区不允许带雨伞，建议用雨衣或冲锋衣。", "徒步鞋：防滑耐磨的登山鞋是必须的，爬马丘比丘或彩虹山时鞋会很脏，建议带旧一点的。", "防晒配件：太阳镜、遮阳帽、冰袖必备，高原紫外线非常强。", "保暖配件：手套、围巾、毛线帽，彩虹山山顶和库斯科早晚很冷。", "泳衣：如果想泡温泉记得带上，但大部分酒店不提供。"]},
{icon:"🧴",title:"洗漱与日用品",list:["洗漱用品：牙刷、牙膏、洗发水、沐浴露，很多酒店不提供一次性用品。", "便携纸巾+湿巾：部分地方洗手间条件一般，纸不会及时补充。", "耳塞眼罩：长途飞行和住宿条件参差不齐时使用。", "保温水壶：高原喝冷水易胃不适，很多酒店提供热水。", "速干毛巾：青旅或部分酒店不提供。"]},
{icon:"💊",title:"药品",list:["高反药：提前一周开始服用红景天，或乙酰唑胺（Diamox）需提前一天开始服用，到库斯科后继续48小时。抵达后避免剧烈运动、多喝水。古柯茶也能缓解高反，但有提神作用，睡眠浅的人睡前少喝。", "便携氧气罐：可在库斯科当地购买，Inkafarma药店有售。", "肠胃药：止泻药（蒙脱石散）、胃胀气药、急性胃疼急救药、益生菌。南美饮食不习惯容易拉肚子。", "防蚊用品：DEET浓度30%以上的驱蚊液，亚马逊地区必带。", "防晒霜：SPF50+以上，每2-3小时补涂一次。高原太阳非常毒辣。", "润唇膏：高原干燥，嘴唇容易裂口。", "创可贴+水泡贴：长途徒步必备。", "感冒药+止痛药：昼夜温差大易感冒，布洛芬可缓解头痛。", "疫苗接种：去热带雨林区域建议提前打黄热病疫苗，入境巴西可能需要黄皮书。部分区域可能需要服用抗疟疾药物。"]},
{icon:"⚠️",title:"注意事项与禁忌",list:["马丘比丘门票：热门线路最好提前三个月预订，现场买可能售罄。", "饮水安全：只喝瓶装水，包括刷牙用水，避免冰块。", "饮食注意：不吃生冷食物，水果削皮吃，路边摊谨慎尝试。", "防盗意识：贵重物品随身保管，不要边走边玩手机，打车摇上车窗。利马等城市夜间不要独行，少露手机和名牌包。", "高反应对：到达库斯科后前两天动作放慢，多喝水，避免暴饮暴食。", "退税：购物时主动要求退税单，机场有自助机器，检查信息是否正确。", "紧急联系：中国驻秘鲁大使馆电话00511-4228251，外交部全球领事保护热线12308。", "能量棒/巧克力：高原消耗大，快速补充能量。"]}
]},
  "哥斯达黎加":{sections:[
{icon:"🛂",title:"证件与签证",list:["护照：有效期6个月以上。", "签证：美签/加签/申根签可免签入境30天。", "驾照翻译件：如自驾需准备。"]},
{icon:"💰",title:"资金与支付",list:["现金：带美元现金，当地通用，小费/路边摊需零钱（多备1美元纸币），约200-500美元够用一周。", "信用卡：Visa/Mastercard、Apple Pay部分商家可用，但现金付tour更划算。"]},
{icon:"🚄",title:"交通出行",list:["租车建议：推荐大公司（Alamo/Budget/Avis）租四驱SUV，路况差但好开，避免本地便宜车押金坑。", "Google Maps/Waze：导航，很多路段无信号需提前下载离线地图。"]},
{icon:"📱",title:"通讯与APP",list:["电话卡：落地办Claro卡即可，或提前买eSIM（Gigsky/Kolbi），景点多有WiFi。"]},
{icon:"🔌",title:"电子设备",list:["插头：美标双扁脚插头转换器（A型两孔）。", "拍摄：运动相机（GoPro/大疆，玩水项目必备，注意配潜水保护壳）。", "充电宝：必备。"]},
{icon:"👕",title:"衣物与防晒",list:["鞋类：溯溪鞋（必带，溪降/温泉/漂流都用得上）、防滑运动鞋、拖鞋。", "上衣：速干短袖T恤、防水冲锋衣/雨衣（雨季必备）、薄外套（早晚温差大）。", "下装：速干长裤（比短裤用得多）、可拆卸两截裤（Convertible pants）。", "其他：泳衣（2-3套，换洗频繁）、防晒帽、墨镜。"]},
{icon:"🧴",title:"洗漱与日用品",list:["手机防水袋：必备。", "防水背包：必备。", "消毒棉片：备用。"]},
{icon:"💊",title:"药品",list:["防晒：高倍防晒霜（选reef-safe环保型，下海友好）、晒后修复凝胶。", "防虫：驱蚊喷雾（非常重要！）、蚊虫叮咬药膏、小蚊帐（住宿不确定是否提供时备用）。", "药品：晕车药（山路颠簸）、创口贴、碘酒、维生素片、肠胃药。"]},
{icon:"⚠️",title:"注意事项与禁忌",list:["最佳季节：12月-4月旱季适合出行，5-10月雨季每天可能暴雨但植被更绿。", "安全提示：不坐黑车、贵重物品保管好、夜间活动跟正规tour、雨林徒步请紧向导。", "小费文化：餐厅账单含服务费可不另给，tour结束自愿给小费。", "环保提醒：部分景点禁塑料瓶，自带水杯；选择对珊瑚友好的防晒霜。"]}
]},
  "埃及":{sections:[
{icon:"🛂",title:"证件与签证",list:["护照：有效期需6个月以上，至少2页空白页，建议复印2份+存电子版分开放。", "签证：落地签需备25美元现金（贴签费），可提前在国内换好小面额零钱。", "行程单：机票酒店预订单打印或截图备用，入境可能查验。"]},
{icon:"💰",title:"资金与支付",list:["银行卡：Visa/Mastercard必带（部分神庙只收卡），银联卡也可备用。", "现金：建议带300-500美元小额钞票用于小费、打车、买水；埃及镑落地换汇更划算。"]},
{icon:"🚄",title:"交通出行",list:["InDrive：打车性价比高，卢克索常用。", "Uber：开罗、赫尔格达可用，明码标价。", "Google Maps：导航找餐厅精准。"]},
{icon:"📱",title:"通讯与APP",list:["当地电话卡：机场落地后办理WE或Orange信号较好，提前飞猪买流量卡可能无法注册打车软件。", "Google翻译：菜单拍照翻译超实用。", "WhatsApp：联系地接、预定行程全靠它。"]},
{icon:"🔌",title:"电子设备",list:["转换插头：欧标两圆孔（C/F型），埃及电压230V。", "充电宝：≤20000mAh，景区无共享充电宝。", "手机挂绳/防水袋：防丢+浮潜拍照用。"]},
{icon:"👕",title:"衣物与防晒",list:["防晒衣/薄外套：昼夜温差大，空调车、清晨热气球会冷。", "长裤长裙：进神庙、清真寺需穿着得体，避免暴露。", "舒适徒步鞋：大量步行，沙石路多，别穿新鞋磨脚。", "泳衣：红海浮潜建议长袖款水母衣，比基尼可选一套拍照用。", "帽子墨镜：宽檐帽+防紫外线墨镜，沙漠紫外线极强。", "丝巾披肩：防晒防风，进清真寺可遮头。"]},
{icon:"🧴",title:"洗漱与日用品",list:["高倍防晒霜：SPF50+ PA++++，身体面部都要带，喷雾方便补涂。", "保湿用品：润唇膏、补水面膜、芦荟胶，气候极度干燥。", "一次性用品：马桶垫、浴巾、枕套、内裤袜子，酒店卫生条件有限。", "纸巾湿巾：景区厕所可能无纸，酒精纸擦座椅很必要。", "牙刷牙膏拖鞋：多数酒店不提供。", "耳塞眼罩：睡眠浅的必带，清真寺早诵经、度假酒店晚上音乐吵。", "中性笔：填写入境卡时用，现场借笔要排队。", "折叠水杯/泡面碗：当地饮食偏油腻，带点国内零食解馋。"]},
{icon:"💊",title:"药品",list:["肠胃药：蒙脱石散、肠炎宁，水土不服必备。", "晕车船药：长途大巴和出海游船都用得上。", "感冒止痛药：布洛芬、小柴胡等应对小毛病。", "创可贴碘伏：玩沙拣贝壳时防止划伤。"]}
]},
  "摩洛哥":{sections:[
{icon:"🛂",title:"证件与签证",list:["护照：有效期需6个月以上，建议准备3页以上空白页，复印或拍照留存首页、签证页和入境章页。", "签证：中国护照免签（停留不超过90天）。", "机票酒店订单：打印返程机票、酒店预订单及行程计划单，入境时可能查验。"]},
{icon:"💰",title:"资金与支付",list:["现金：携带美元或欧元到当地兑换摩洛哥迪拉姆，机场可换少量应急，市区换汇点汇率更划算。", "信用卡：Visa/Mastercard在主要城市酒店餐厅可用，银联卡基本无法取现。", "小费准备：准备少量零钱用于午餐和小费。"]},
{icon:"🚄",title:"交通出行",list:["Google Maps：地图导航。", "inDrive：打车，注意当地规定不合法需隐蔽使用。", "Glovo：外卖。", "Booking/Airbnb：住宿。"]},
{icon:"📱",title:"通讯与APP",list:["电话卡：机场有免费电话卡领取（无流量），推荐Inwi或Maroc Telecom（沙漠信号覆盖好），Orange不推荐。", "WhatsApp：联络。"]},
{icon:"🔌",title:"电子设备",list:["转换插头：欧标两圆孔插头（部分酒店是带凸点的圆柱形，建议买中间带孔的）。", "充电宝：容量不超过2万毫安，沙漠地区无法充电需提前备满电。"]},
{icon:"👕",title:"衣物与防晒",list:["防晒装备：墨镜、遮阳帽、防晒霜（高倍数）、防晒衣/防晒口罩。", "日常穿着：轻薄透气长袖衣裤、过膝衣服（尊重当地文化，进清真寺需遮盖肩膀和膝盖）。", "保暖外套：薄羽绒或防风外套（沙漠昼夜温差大，晚上很冷）。", "鞋子：舒适平底鞋/运动鞋（老城全是石板路和台阶）、拖鞋、短靴（爬沙丘用）。", "配饰：大围巾/头巾（2-3米，防沙防晒拍照出片）、丝巾、夸张耳环项链。", "颜色建议：白色、红色、黄色、绿色等亮色连衣裙在舍夫沙万和马拉喀什很出片。"]},
{icon:"🧴",title:"洗漱与日用品",list:["个人护理：牙膏牙刷梳子（酒店不提供）、保湿面膜、润唇膏、护手霜、压缩浴巾。", "其他用品：一次性床单、一次性马桶垫、一次性内衣、免洗洗手液、保温杯、压缩烧水壶（当地无热水供应）。", "零食储备：榨菜、山楂条等开胃零食（当地饮食以塔吉锅为主，口味单一）。"]},
{icon:"💊",title:"药品",list:["常用药品：肠胃药、感冒药、晕车药、创可贴、过敏药、止疼药、防蚊喷雾。"]},
{icon:"⚠️",title:"注意事项与禁忌",list:["防盗抢：贵重物品随身携带，手机最好有绳子挂住脖子，背包前置，夜间结伴出行。", "海关提醒：坚持要求盖入境章（即使对方说不用盖也要盖章），避免出境时被卡。", "饮食卫生：喝矿泉水不买散装水，尝试当地美食但注意适量。", "禁忌事项：穆斯林国家禁止猪肉，公共场合不宜喝酒，无人机未经许可不得携带入境。", "砍价技巧：市场购物大胆对半砍价，先问清价格再决定购买。"]}
]},
  "南非":{sections:[
{icon:"🛂",title:"证件与签证",list:["护照：有效期需超过6个月，至少2页空白页。", "签证：中国护照需提前办理旅游签，电子签约170元（3-5个工作日）或纸质签约430元（5-10个工作日）。", "机票酒店订单：打印往返机票和酒店预订单，入境可能查验。", "驾照及翻译件：如计划租车，需带原件+国际翻译件，南非右舵左行。", "证件备份：护照、签证复印+电子版存手机，单独放一份在行李箱。"]},
{icon:"💰",title:"资金与支付",list:["信用卡：带Visa或Mastercard芯片卡，大部分地方可刷卡，磁条卡可能无法使用。", "现金：建议换少量美元（2019年后版本，小面值方便给小费）+兰特（可在当地ATM取现，汇率更好）。"]},
{icon:"🚄",title:"交通出行",list:["Uber：开普敦好用。", "Waze：导航。", "WhatsApp：联系商家。"]},
{icon:"📱",title:"通讯与APP",list:["电话卡：提前飞猪买好落地能用，或到机场买Vodacom/MTN（景区信号可能不稳定）。", "Google Maps：导航。"]},
{icon:"🔌",title:"电子设备",list:["转换插头：南非用欧标/英标三圆孔插头（Type M），建议带2个+一个小型接线板。", "充电宝：20000毫安以内，飞机可携带。", "数据线/充电线：多备几根，手机、相机一起充。"]},
{icon:"👕",title:"衣物与防晒",list:["季节性衣物：6-8月是南非冬季，早晚凉需厚外套；12-2月夏季带轻薄透气衣物。", "防晒装备：高倍数防晒霜、墨镜、遮阳帽、防晒衣（紫外线非常强）。", "舒适鞋袜：走路多穿舒服的鞋，Safari行程穿长袖长裤防蚊虫。", "一次性用品：一次性内裤、床单被套（部分酒店卫生标准不一）。"]},
{icon:"🧴",title:"洗漱与日用品",list:["牙刷牙膏拖鞋：多数酒店不提供，需自备。", "护肤品：面膜、润唇膏、保湿霜（气候干燥）。", "卫生用品：纸巾、湿巾、女性卫生用品。", "小工具：指甲刀、折叠衣架、行李收纳袋。"]},
{icon:"💊",title:"药品",list:["常用药：感冒药、肠胃药、退烧药、创口贴、抗过敏药。", "防蚊用品：驱蚊液、电蚊拍（Safari期间有用）。", "特殊药品：疟疾药（如去野生动物园）、个人处方药。", "其他防护：口罩（防尘/油漆味）、洗鼻器（风沙大）。"]},
{icon:"⚠️",title:"注意事项与禁忌",list:["安全提示：低调出行，不要露富，贵重物品妥善保管，夜间避免独自外出。", "旅游保险：强烈建议购买，医疗费用昂贵。", "电压：220V/50Hz，与中国相同。"]}
]},
  "肯尼亚":{sections:[
{icon:"🛂",title:"证件与签证",list:["护照：有效期需6个月以上，空白页充足。", "ETA电子旅行许可：入境前必须申请，至少提前1周在官网办理，打印纸质版+手机留档。", "黄热病疫苗接种证（小黄本）：建议提前15天接种，虽有时不查但被查到未携带可能罚款。", "机票酒店行程单：打印纸质版，入境时可能被要求出示回程机票。"]},
{icon:"💰",title:"资金与支付",list:["美金现金：建议带新版1美元、5美元、10美元小面额，用于给小费（向导约10美元/天/人）。", "信用卡：Visa或Mastercard，大部分酒店和餐厅可刷卡。"]},
{icon:"🚄",title:"交通出行",list:["Google Maps：导航。"]},
{icon:"📱",title:"通讯与APP",list:["WhatsApp：联络。"]},

{icon:"👕",title:"衣物与防晒",list:["冲锋衣/薄羽绒服：早晚温差极大，清晨看动物时非常冷。", "防晒衣/长袖衬衫：白天紫外线强，物理防晒最重要。", "大地色系衣物：卡其色、棕色、白色为主，拍照出片且不易显脏。", "长裤+速干T恤：多带几条裤子，百搭好穿。", "洞洞鞋/拖鞋：车上穿脱方便，可踩座椅拍照，酒店洗澡也用得上。", "遮阳帽+墨镜+防晒面罩：灰尘大紫外线强，必备三件套。", "舒适运动鞋：日常行走用。"]},

const MAX_Q=6;
let state={round:0,correct:0,wrong:0,questions:[],history:[],totalQ:0,currentCountry:''};
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function goHome(){showScreen('startScreen')}
function renderCountryCards(){
  const sec=document.getElementById('countrySection');
  const groups={};
  QUESTIONS.forEach(q=>{
    if(!groups[q.region])groups[q.region]={};
    if(!groups[q.region][q.country])groups[q.region][q.country]={flag:q.flag,count:0};
    groups[q.region][q.country].count++;
  });
  let html='';
  for(const[rkey,r]of Object.entries(REGIONS)){
    const cs=groups[rkey];if(!cs)continue;
    const order=['日本','韩国','新加坡','泰国','马来西亚','越南','菲律宾','柬埔寨','阿联酋','意大利','法国','英国','德国','西班牙','俄罗斯','希腊','瑞典','瑞士','荷兰','葡萄牙','冰岛','爱尔兰','土耳其','美国','墨西哥','巴西','加拿大','阿根廷','智利','古巴','秘鲁','哥斯达黎加','埃及','摩洛哥','南非','肯尼亚','澳大利亚'];
    const sorted=Object.entries(cs).sort((a,b)=>order.indexOf(a[0])-order.indexOf(b[0]));
    html+=`<div class="country-region-block"><div class="country-region-title">${r.icon} ${r.name}（${sorted.length}）</div><div class="country-grid">`;
    sorted.forEach(([cname,info])=>{
      html+=`<div class="country-card" onclick="startGame('${cname}')"><div class="cc-flag">${info.flag}</div><div class="cc-name">${cname}</div></div>`;
    });
    html+='</div></div>';
  }
  sec.innerHTML=html;
}
renderCountryCards();
function startGame(country){
  const pool=QUESTIONS.filter(q=>q.country===country);
  const totalQ=Math.min(MAX_Q,pool.length);
  state={round:0,correct:0,wrong:0,questions:shuffle(pool).slice(0,totalQ),history:[],totalQ,currentCountry:country};
  showScreen('gameScreen');showQuestion();
}
function showQuestion(){
  const q=state.questions[state.round];
  document.getElementById('roundInfo').textContent=`第 ${state.round+1}/${state.totalQ} 题`;
  document.getElementById('correctCounter').textContent=`✅ ${state.correct}/${state.round}`;
  document.getElementById('countryFlag').textContent=q.flag;
  document.getElementById('countryName').textContent=q.country;
  document.getElementById('behaviorText').textContent=`"${q.behavior}"`;
  document.getElementById('hintText').textContent=q.hint||'';
  document.getElementById('situationHint').style.display=q.hint?'flex':'none';
  document.getElementById('questionCard').className='question-card';
  document.getElementById('okBtn').disabled=false;document.getElementById('noBtn').disabled=false;
  document.getElementById('okBtn').className='answer-btn ok-btn';document.getElementById('noBtn').className='answer-btn no-btn';
  document.getElementById('answerBtns').style.display='flex';
  document.getElementById('explanationArea').innerHTML='';
  document.getElementById('nextBtnWrap').style.display='none';
}
function answer(userSaysOk){
  const q=state.questions[state.round];const isRight=(userSaysOk===q.ok);const card=document.getElementById('questionCard');
  document.getElementById('okBtn').disabled=true;document.getElementById('noBtn').disabled=true;
  if(userSaysOk){document.getElementById('okBtn').classList.add('chosen-ok')}else{document.getElementById('noBtn').classList.add('chosen-no')}
  if(isRight){state.correct++;card.classList.add('correct-bg')}else{state.wrong++;card.classList.add('wrong-bg')}
  state.history.push({q,isRight});
  document.getElementById('correctCounter').textContent=`✅ ${state.correct}/${state.round+1}`;
  const answerText=q.ok?'✅ 其实可以这样做':'❌ 这样做不行哦';
  document.getElementById('explanationArea').innerHTML=`<div class="explanation ${isRight?'correct':'wrong'}"><div class="result-label"><span class="icon">${isRight?'🎉':'💡'}</span>${isRight?'答对了！':'答错了～'} ${isRight?'':answerText}</div><div class="fact">${q.fact}</div><div class="learn">💡 ${q.learn}</div></div>`;
  document.getElementById('nextBtnWrap').style.display='block';
  document.getElementById('nextBtnWrap').querySelector('.btn').textContent=state.round<state.totalQ-1?'下一题 →':'查看结果 🎉';
}
function nextQuestion(){state.round++;if(state.round>=state.totalQ){showFinal();return}showQuestion()}
function showFinal(){
  showScreen('finalScreen');
  const pct=Math.round((state.correct/state.totalQ)*100);
  let rank='';
  if(pct>=90)rank='文化旅行家！这个国家的文化你了如指掌。'
  else if(pct>=70)rank='资深旅客！大部分文化都掌握了，再补补冷门知识。'
  else if(pct>=50)rank='好奇背包客！有一些文化盲区，出发前再做做功课。'
  else rank='文化小白…建议出发前好好了解一下当地风俗。'
  const c=state.currentCountry;
  const flag=(QUESTIONS.find(q=>q.country===c)||{}).flag||'';
  document.getElementById('finalResult').innerHTML=`${state.correct}<span class="result-unit">/${state.totalQ}</span>`;
  document.getElementById('finalRegionTag').textContent=`${flag} ${c}`;
  document.getElementById('finalRank').textContent=rank;
  renderTabs(c);
  renderTravelCard(c);
}







function renderTabs(current){
  const el=document.getElementById('countryTabs');
  const groups={};
  QUESTIONS.forEach(q=>{
    if(!groups[q.region])groups[q.region]={};
    if(!groups[q.region][q.country])groups[q.region][q.country]=q.flag;
  });
  const order=['日本','韩国','新加坡','泰国','马来西亚','越南','菲律宾','柬埔寨','阿联酋','意大利','法国','英国','德国','西班牙','俄罗斯','希腊','瑞典','瑞士','荷兰','葡萄牙','冰岛','爱尔兰','土耳其','美国','墨西哥','巴西','加拿大','阿根廷','智利','古巴','秘鲁','哥斯达黎加','埃及','摩洛哥','南非','肯尼亚','澳大利亚'];
  let tabs='';
  for(const[rkey,r]of Object.entries(REGIONS)){
    const cs=groups[rkey];if(!cs)continue;
    const sorted=Object.keys(cs).sort((a,b)=>order.indexOf(a)-order.indexOf(b));
    sorted.forEach(cn=>{
      tabs+=`<div class="tab-item${cn===current?' active':''}" id="tab-${cn}" onclick="pickTab('${cn}')"><span class="tab-flag">${cs[cn]}</span>${cn}</div>`;
    });
  }
  el.innerHTML=`<div class="tab-scroll">${tabs}</div><div class="tab-filter" onclick="openCountryModal()">更多</div>`;
  setTimeout(()=>{const a=document.querySelector('.tab-item.active');if(a)a.scrollIntoView({behavior:'instant',inline:'center',block:'nearest'})},50);
}
function openCountryModal(){
  const c=state.currentCountry;
  const groups={};
  QUESTIONS.forEach(q=>{
    if(!groups[q.region])groups[q.region]={};
    if(!groups[q.region][q.country])groups[q.region][q.country]=q.flag;
  });
  const order=['日本','韩国','新加坡','泰国','马来西亚','越南','菲律宾','柬埔寨','阿联酋','意大利','法国','英国','德国','西班牙','俄罗斯','希腊','瑞典','瑞士','荷兰','葡萄牙','冰岛','爱尔兰','土耳其','美国','墨西哥','巴西','加拿大','阿根廷','智利','古巴','秘鲁','哥斯达黎加','埃及','摩洛哥','南非','肯尼亚','澳大利亚'];
  let h='';
  for(const[rkey,r]of Object.entries(REGIONS)){
    const cs=groups[rkey];if(!cs)continue;
    const sorted=Object.keys(cs).sort((a,b)=>order.indexOf(a)-order.indexOf(b));
    h+=`<div class="cm-region"><div class="cm-region-title">${r.icon} ${r.name}</div><div class="cm-grid">`;
    sorted.forEach(cn=>{
      h+=`<div class="cm-cell${cn===c?' active':''}" onclick="pickCountry('${cn}')"><span class="cm-flag">${cs[cn]}</span><span class="cm-name">${cn}</span></div>`;
    });
    h+='</div></div>';
  }
  document.getElementById('cmBody').innerHTML=h;
  document.getElementById('countryModal').classList.add('open');
}
function closeCountryModal(){document.getElementById('countryModal').classList.remove('open')}
function pickTab(country){
  state.currentCountry=country;
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  const at=document.getElementById('tab-'+country);
  if(at)at.classList.add('active');
  renderTravelCard(country);
}
function pickCountry(country){
  pickTab(country);
  closeCountryModal();
}
function renderTravelCard(c){
  const travel=TRAVEL[c];
  let r='';
  if(travel){
    if(travel.sections){
      travel.sections.forEach(s=>{
        r+=`<div class="travel-module"><div class="travel-module-title">${s.icon} ${s.title}</div>`;
        if(s.items){r+='<ul>'+s.items.map(i=>i.v?`<li><span class="ti-b">${i.k}：</span>${i.v}</li>`:`<li>${i.k}</li>`).join('')+'</ul>';}
        if(s.list){r+='<ul>'+s.list.map(t=>'<li>'+t+'</li>').join('')+'</ul>';}
        if(s.text){r+=`<p>${s.text}</p>`;}
        r+='</div>';
      });
    }else{
      r+=`<div class="travel-module"><div class="travel-module-title">\uD83D\uDEC2 签证</div><p>${travel.visa}</p></div>`;
      r+=`<div class="travel-module"><div class="travel-module-title">\uD83D\uDCC5 最佳时间</div><ul>${travel.bestTime.map(t=>'<li>'+t+'</li>').join('')}</ul></div>`;
      r+=`<div class="travel-module"><div class="travel-module-title">\uD83C\uDF92 行李清单</div><ul>${travel.packing.map(t=>'<li>'+t+'</li>').join('')}</ul></div>`;
      r+=`<div class="travel-module"><div class="travel-module-title">\uD83D\uDCB0 货币支付</div><ul>${travel.payment.map(t=>'<li>'+t+'</li>').join('')}</ul></div>`;
      r+=`<div class="travel-module"><div class="travel-module-title">\uD83D\uDD0C 实用贴士</div><ul>${travel.tips.map(t=>'<li>'+t+'</li>').join('')}</ul></div>`;
    }
  }
  document.getElementById('travelArea').innerHTML=r;
}
</script>
