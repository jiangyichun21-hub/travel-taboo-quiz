<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行禁忌猜猜看 — 别踩文化的坑</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:linear-gradient(135deg,#e8f4fd 0%,#f0faf6 100%);min-height:100vh;color:#2d3748;overflow-x:hidden}
.screen{display:none;animation:fadeIn .5s ease}.screen.active{display:flex;flex-direction:column;align-items:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounceIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes flipIn{0%{transform:rotateY(90deg);opacity:0}100%{transform:rotateY(0);opacity:1}}
@keyframes streak{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes correctBg{0%{background:#f0fff4}50%{background:#c6f6d5}100%{background:#f0fff4}}
@keyframes wrongBg{0%{background:#fff5f5}50%{background:#fed7d7}100%{background:#fff5f5}}
.btn{padding:14px 40px;border:none;border-radius:50px;font-size:18px;font-weight:600;cursor:pointer;transition:all .25s ease;outline:none;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#4ecdc4,#44b3ab);color:#fff;box-shadow:0 4px 15px rgba(78,205,196,.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(78,205,196,.45)}
.btn-secondary{background:#fff;color:#4ecdc4;border:2px solid #4ecdc4}
.btn-secondary:hover{background:#f0faf6}
#startScreen{justify-content:center;min-height:100vh;padding:40px 20px 30px;text-align:center}
.logo{font-size:80px;margin-bottom:16px;animation:bounceIn .8s ease}
.title{font-size:32px;font-weight:700;color:#1a7a6d;margin-bottom:8px;letter-spacing:1px}
.subtitle{font-size:15px;color:#718096;margin-bottom:36px;line-height:1.7;max-width:360px}
#regionScreen{justify-content:flex-start;min-height:100vh;padding:30px 20px;text-align:center}
.region-header{margin-bottom:24px}
.region-header h2{font-size:22px;font-weight:700;color:#1a7a6d;margin-bottom:6px}
.region-header p{font-size:14px;color:#718096;line-height:1.5}
.region-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:420px;margin-bottom:16px}
.region-card{background:#fff;border-radius:16px;padding:18px 14px;text-align:center;cursor:pointer;transition:all .25s ease;border:2px solid transparent;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.region-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.1);border-color:#4ecdc4}
.region-card .rc-icon{font-size:32px;margin-bottom:6px}
.region-card .rc-name{font-size:15px;font-weight:600;color:#2d3748;margin-bottom:4px}
.region-card .rc-flags{font-size:18px;margin-bottom:6px;letter-spacing:2px}
.region-card .rc-count{font-size:12px;color:#a0aec0;background:#f7fafc;border-radius:10px;padding:2px 10px;display:inline-block}
.region-card.disabled{opacity:.5;cursor:default;pointer-events:none}
#gameScreen{padding:20px;width:100%;max-width:480px;margin:0 auto;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:20px;flex-wrap:wrap;gap:6px}
.round-info{font-size:14px;color:#718096;font-weight:500}
.score-display{background:#fff;padding:6px 16px;border-radius:20px;font-size:14px;font-weight:600;color:#1a7a6d;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.streak-display{font-size:13px;color:#f6ad55;font-weight:600;margin-left:8px}
.streak-display.active{animation:streak .4s ease}
.question-card{background:#fff;border-radius:24px;padding:36px 28px;width:100%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.06);margin-bottom:24px;transition:background .4s ease}
.question-card.correct-bg{animation:correctBg .6s ease}
.question-card.wrong-bg{animation:wrongBg .6s ease}
.country-flag{font-size:56px;margin-bottom:8px}
.country-name{font-size:14px;color:#a0aec0;font-weight:500;margin-bottom:16px;letter-spacing:1px}
.behavior-text{font-size:20px;font-weight:600;line-height:1.6;color:#2d3748;margin-bottom:8px}
.situation-hint{background:#fffdf0;border:1.5px solid #f6e05e;border-radius:12px;padding:12px 16px;margin:12px 0 0;text-align:left;font-size:13px;color:#744210;line-height:1.5;display:flex;align-items:flex-start;gap:8px}
.situation-hint .hint-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.answer-btns{display:flex;gap:16px;width:100%;margin-bottom:20px;justify-content:center}
.answer-btn{flex:1;max-width:180px;padding:16px 20px;border:2.5px solid #e2e8f0;border-radius:16px;background:#fff;font-size:18px;font-weight:600;cursor:pointer;transition:all .2s ease;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.answer-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.answer-btn.ok-btn:hover{border-color:#38a169;background:#f0fff4;color:#38a169}
.answer-btn.no-btn:hover{border-color:#e53e3e;background:#fff5f5;color:#e53e3e}
.answer-btn:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none}
.answer-btn.chosen-ok{border-color:#38a169;background:#f0fff4;color:#38a169}
.answer-btn.chosen-no{border-color:#e53e3e;background:#fff5f5;color:#e53e3e}
.explanation{width:100%;border-radius:16px;padding:20px 24px;margin-bottom:20px;animation:flipIn .4s ease;text-align:left;line-height:1.6}
.explanation.correct{background:linear-gradient(135deg,#f0fff4,#e6ffed);border:2px solid #c6f6d5}
.explanation.wrong{background:linear-gradient(135deg,#fff5f5,#ffe3e3);border:2px solid #feb2b2}
.explanation .result-label{font-size:15px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.explanation .result-label .icon{font-size:20px}
.explanation .fact{font-size:14px;color:#4a5568;margin-bottom:6px}
.explanation .learn{font-size:13px;color:#718096;line-height:1.5;padding-top:8px;border-top:1px solid rgba(0,0,0,.06)}
.next-btn-wrap{text-align:center;width:100%}
.next-btn-wrap .btn{padding:12px 36px;font-size:15px}
#finalScreen{min-height:100vh;padding:0 0 70px;text-align:center;justify-content:flex-start}
.final-top{padding:28px 16px 20px;display:flex;flex-direction:column;align-items:center}
.final-result{font-size:52px;font-weight:800;color:#1a7a6d;margin-bottom:4px;letter-spacing:-1px}
.final-result .result-unit{font-size:16px;font-weight:600;color:#718096;margin-left:2px}
.final-title{font-size:18px;font-weight:600;color:#2d3748;margin-bottom:10px}
.final-region-tag{font-size:12px;color:#4ecdc4;background:#f0faf6;border:1px solid #4ecdc4;border-radius:12px;padding:2px 12px;display:inline-block;margin-bottom:6px}
.final-rank{font-size:13px;color:#718096;line-height:1.4;max-width:300px}
.culture-section{width:100%;max-width:480px;padding:0 16px;margin:0 auto;text-align:left}
.culture-title{font-size:14px;color:#2d3748;font-weight:700;margin-bottom:14px;text-align:center;letter-spacing:1px}
.culture-country{background:#fff;border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.culture-country-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#f7fafc;border-bottom:1px solid #edf2f7}
.culture-country-header .cc-flag{font-size:22px}
.culture-country-header .cc-name{font-size:14px;font-weight:700;color:#2d3748}
.culture-fact{padding:12px 14px;border-bottom:1px solid #f0f0f0;display:flex;align-items:flex-start;gap:8px}
.culture-fact:last-child{border-bottom:none}
.culture-fact .fact-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.culture-fact .fact-text{font-size:13px;color:#4a5568;line-height:1.6}
.final-btns{position:fixed;bottom:0;left:0;right:0;display:flex;gap:10px;padding:12px 16px;background:#fff;box-shadow:0 -2px 12px rgba(0,0,0,.06);z-index:100;justify-content:center}
.final-btns .btn{flex:1;max-width:200px;padding:12px 16px;font-size:14px}
.travel-toggle{display:flex;align-items:center;gap:6px;padding:10px 14px;font-size:12px;font-weight:600;color:#4ecdc4;cursor:pointer;border-top:1px solid #edf2f7;background:#f7fafc;transition:background .2s}
.travel-toggle:hover{background:#edf7f6}
.travel-toggle .arrow{transition:transform .2s;display:inline-block}
.travel-toggle.open .arrow{transform:rotate(180deg)}
.travel-list{display:none;padding:10px 14px 14px}
.travel-list.open{display:block}
.travel-module{margin-bottom:12px}
.travel-module:last-child{margin-bottom:0}
.travel-module-title{font-size:12px;font-weight:700;color:#2d3748;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.travel-module ul{list-style:none;padding:0;margin:0}
.travel-module li{font-size:12px;color:#4a5568;line-height:1.6;padding:2px 0 2px 12px;position:relative}
.travel-module li::before{content:'·';position:absolute;left:0;color:#a0aec0}
.travel-module p{font-size:12px;color:#4a5568;line-height:1.6;margin:0}
</style>
</head>
<body>
<div id="startScreen" class="screen active">
  <div class="logo">🌍</div>
  <div class="title">旅行禁忌猜猜看</div>
  <div class="subtitle">去不同国家旅行，哪些事能做、哪些事万万不行？<br>选择你感兴趣的旅行地区，开始挑战吧！</div>
  <div class="region-grid" id="regionGrid"></div>
</div>
<div id="gameScreen" class="screen">
  <div class="header">
    <span class="round-info" id="roundInfo">第 1/6 题</span>
    <span><span class="score-display" id="scoreDisplay">🏆 0</span><span class="streak-display" id="streakDisplay"></span></span>
  </div>
  <div class="question-card" id="questionCard">
    <div class="country-flag" id="countryFlag"></div>
    <div class="country-name" id="countryName"></div>
    <div class="behavior-text" id="behaviorText"></div>
    <div class="situation-hint" id="situationHint"><span class="hint-icon">💬</span><span id="hintText"></span></div>
  </div>
  <div class="answer-btns" id="answerBtns">
    <button class="answer-btn ok-btn" id="okBtn" onclick="answer(true)">✅ 可以</button>
    <button class="answer-btn no-btn" id="noBtn" onclick="answer(false)">❌ 不可以</button>
  </div>
  <div id="explanationArea"></div>
  <div class="next-btn-wrap" id="nextBtnWrap" style="display:none">
    <button class="btn btn-primary" onclick="nextQuestion()">下一题 →</button>
  </div>
</div>
<div id="finalScreen" class="screen">
  <div class="final-top">
    <div class="final-result" id="finalResult">0/0</div>
    <div class="final-title">答题结束</div>
    <div class="final-region-tag" id="finalRegionTag"></div>
    <div class="final-rank" id="finalRank"></div>
  </div>
  <div class="culture-section" id="cultureArea"></div>
  <div class="final-btns">
    <button class="btn btn-primary" onclick="goHome()">换个地区</button>
    <button class="btn btn-secondary" onclick="goHome()">返回首页</button>
  </div>
</div>
<script>
const REGIONS={
  asia:{name:'亚洲',icon:'🌏',flags:'🇨🇳🇯🇵🇰🇷🇹🇭🇻🇳🇲🇾🇮🇩🇸🇬🇮🇳🇱🇰🇳🇵'},
  europe:{name:'欧洲',icon:'🏰',flags:'🇮🇹🇫🇷🇬🇧🇩🇪🇪🇸🇷🇺🇬🇷🇨🇭🇸🇪🇩🇰🇮🇸🇭🇺'},
  middleeast:{name:'中东',icon:'🕌',flags:'🇹🇷🇸🇦🇦🇪🇯🇴🇶🇦🇮🇱🇮🇷🇴🇲🇰🇼🇱🇧'},
  africa:{name:'非洲',icon:'🌍',flags:'🇪🇬🇲🇦🇰🇪🇿🇦🇹🇿🇹🇳🇬🇭🇸🇳🇪🇹🇧🇼'},
  americas:{name:'美洲',icon:'🌎',flags:'🇺🇸🇨🇦🇲🇽🇧🇷🇨🇺🇦🇷🇨🇱🇵🇪🇨🇷🇯🇲'},
  oceania:{name:'大洋洲',icon:'🌊',flags:'🇦🇺🇳🇿🇫🇯🇵🇫🇵🇬'}
};
const QUESTIONS=[
{country:'泰国',flag:'🇹🇭',region:'asia',behavior:'摸当地小孩的头表示友好',ok:false,hint:'你在曼谷的夜市闲逛，看到一个非常可爱的泰国小朋友，忍不住想伸手摸摸他的头...',fact:'在泰国，头部被视为身体最神圣的部位。',learn:'泰国是佛教国家，头部被认为是灵魂所在。即使是善意的摸头，也会被看作极大的冒犯。'},
{country:'日本',flag:'🇯🇵',region:'asia',behavior:'吃拉面时大声吸溜',ok:true,hint:'你第一次来日本旅行，走进东京一家拉面店，发现周围的日本人吃面都在发出声音...',fact:'在日本，吸面条发出声音是表示"好吃"的方式。',learn:'日本人吃拉面、荞麦面时发出声音不仅不礼貌，反而是对厨师的赞美。不过喝汤和吃米饭时还是要安静。'},
{country:'印度',flag:'🇮🇳',region:'asia',behavior:'用右手递东西给别人',ok:true,hint:'你在新德里的街头市场买纪念品，摊主递给你一件商品，你需要把护照递给他看...',fact:'在印度，右手才是"干净"的手。',learn:'印度文化中左手用于清洁身体，被认为不洁。递东西、握手、吃饭都应该用右手。'},
{country:'印度',flag:'🇮🇳',region:'asia',behavior:'用左手接别人递来的食物',ok:false,hint:'你在印度朋友家做客，主人热情地端来一杯马萨拉奶茶，你顺手用左手去接...',fact:'在印度，左手被视为"不洁"的手。',learn:'因为左手传统上用于如厕后的清洁，所以用左手接食物或递东西是很不礼貌的。'},
{country:'韩国',flag:'🇰🇷',region:'asia',behavior:'把筷子竖直插在米饭上',ok:false,hint:'你在首尔的餐厅吃饭，端上来一碗米饭和一双筷子，你随手把筷子插在了米饭里...',fact:'竖直插筷子是韩国祭祀时的摆法。',learn:'在韩国（以及中国、日本部分地区），把筷子竖插在饭里类似祭祀亡者的香火，非常忌讳。应该平放在碗边或筷架上。'},
{country:'土耳其',flag:'🇹🇷',region:'middleeast',behavior:'去土耳其人家里做客时带酒作为礼物',ok:false,hint:'你的土耳其同事邀请你周末去他家吃晚饭，你想着带瓶红酒当伴手礼，毕竟在中国这是很得体的...',fact:'土耳其虽然世俗化，但多数人口信仰伊斯兰教。',learn:'很多土耳其人不饮酒，送酒可能被视为冒犯。去做客最好带甜点（如土耳其软糖）、鲜花或巧克力。'},
{country:'新加坡',flag:'🇸🇬',region:'asia',behavior:'在公共场所嚼口香糖',ok:false,hint:'你刚从国内飞到新加坡樟宜机场，口袋里还有一包没吃完的口香糖，想嚼一颗清新口气...',fact:'新加坡对口香糖有严格的法律禁令。',learn:'1992年起新加坡禁止进口和销售口香糖（药用除外），乱吐口香糖会被罚款。去新加坡记得不要带口香糖入境。'},
{country:'意大利',flag:'🇮🇹',region:'europe',behavior:'下午3点点一杯卡布奇诺',ok:false,hint:'你在罗马逛街走累了，下午3点走进一家咖啡馆，想在悠闲的午后喝一杯卡布奇诺配甜点...',fact:'在意大利，卡布奇诺是"早餐饮品"。',learn:'意大利人只在早餐时（上午11点前）喝卡布奇诺，因为牛奶被认为影响消化。午后点卡布奇诺会立刻暴露你是游客。'},
{country:'日本',flag:'🇯🇵',region:'asia',behavior:'在餐厅吃完饭后给服务员小费',ok:false,hint:'你在京都的一家高级和食餐厅吃完了一顿精致的怀石料理，服务非常周到，你想留下小费表示感谢...',fact:'日本没有小费文化，给小费反而让人困惑。',learn:'日本服务业以"おもてなし"（极致待客）为荣，不收额外费用。给小费甚至可能被追出来还给你。'},
{country:'泰国',flag:'🇹🇭',region:'asia',behavior:'用餐时用脚去勾远处的椅子',ok:false,hint:'你在清迈的一家露天餐厅吃饭，椅子离你有点远，懒得站起来，想用脚把椅子勾过来...',fact:'在泰国，脚被视为身体最低贱的部位。',learn:'泰国文化中头最神圣、脚最低贱。用脚指东西、踩门槛、把脚底对着人都是严重的不尊重。'},
{country:'德国',flag:'🇩🇪',region:'europe',behavior:'参加聚会时迟到15分钟到场',ok:true,hint:'你的德国朋友邀请你参加周末的家庭聚会，约好晚上7点开始，你想着该准点到还是稍晚一点...',fact:'德国人对"准时"的理解和你想的不一样。',learn:'德国人非常守时，但社交聚会通常允许迟到5-15分钟（称为"学术一刻钟"）。不过商务场合必须准时。'},
{country:'英国',flag:'🇬🇧',region:'europe',behavior:'用食指和中指比V字手势（手背朝外）',ok:false,hint:'你在伦敦旅游，朋友帮你拍照，你开心地比了个V字手势，但不小心手背朝向了镜头...',fact:'手背朝外的V字手势在英国是侮辱性手势。',learn:'手心朝外的V是"胜利/和平"，但手背朝外等同于竖中指。这个手势源于英法百年战争。拍照比耶时注意手心朝外！'},
{country:'中东',flag:'🇸🇦',region:'middleeast',behavior:'未经允许拍摄当地女性',ok:false,hint:'你在迪拜老城区游览，看到几位穿着传统黑色长袍的女性走过，觉得画面很美想拍下来...',fact:'在中东地区，拍摄陌生女性是非常严重的冒犯。',learn:'中东文化重视女性隐私，未经许可拍摄女性可能引发严重冲突。在清真寺等宗教场所拍照也需事先确认。'},
{country:'法国',flag:'🇫🇷',region:'europe',behavior:'进面包店时先跟店员说Bonjour',ok:true,hint:'你在巴黎街头看到一家飘香的面包店，走进去想买几个可颂，店员正看着你...',fact:'在法国，进店先打招呼是基本社交礼仪。',learn:'法国人非常重视礼貌用语。进入任何商店都应该先说"Bonjour"，不说就直接挑东西会被认为很粗鲁。'},
{country:'西班牙',flag:'🇪🇸',region:'europe',behavior:'晚上8点就去餐厅吃晚饭',ok:false,hint:'你在马德里逛了一天，晚上8点肚子饿了，想找一家当地餐厅吃晚饭...',fact:'西班牙人的晚餐时间通常在晚上9-11点。',learn:'西班牙作息比大多数欧洲国家晚2小时。午餐在下午2-4点，晚餐在9点以后。8点去可能连厨房都还没开。'},
{country:'越南',flag:'🇻🇳',region:'asia',behavior:'过马路时伸手拦车让车停下来',ok:false,hint:'你站在胡志明市的街头，面前是一条川流不息的摩托车河，你想伸手让车停下来再过...',fact:'越南的摩托车流几乎不会为行人停下。',learn:'越南过马路的秘诀是匀速前进、不要停、不要后退，车流会绕着你走。伸手拦车反而容易造成事故。'},

{country:'摩洛哥',flag:'🇲🇦',region:'africa',behavior:'在当地人家做客时拒绝喝薄荷茶',ok:false,hint:'你在马拉喀什的老城游览，一位摩洛哥大叔热情地邀请你到他家做客，端上了薄荷茶，但你不太想喝...',fact:'摩洛哥薄荷茶是待客的核心礼仪。',learn:'摩洛哥人待客必上薄荷茶（通常连上三杯），拒绝喝茶非常失礼。至少象征性地抿一口。'},

{country:'希腊',flag:'🇬🇷',region:'europe',behavior:'用手掌张开对着别人的脸（Moutza手势）',ok:false,hint:'你在雅典的一家餐厅吃饭，服务员问你菜好不好吃，你张开手掌对着他比了个"停"的手势想表示"太棒了不用说了"...',fact:'张开手掌对着别人的脸在希腊叫Moutza，是极大的侮辱。',learn:'Moutza源于拜占庭时期用灰烬涂抹罪犯脸部的刑罚。在希腊千万不要张开手掌对着人，哪怕只是想表示"停"或"不要"。'},

{country:'马来西亚',flag:'🇲🇾',region:'asia',behavior:'用食指指着别人说话',ok:false,hint:'你在吉隆坡和同事讨论工作方案，激动之下用食指指着对方强调自己的观点...',fact:'在马来西亚，用食指指人是非常不礼貌的。',learn:'马来文化中用食指指人被认为具有攻击性。如果需要指示方向或人，应该用右手拇指（其余四指握拳），这才是礼貌的方式。'},

{country:'缅甸',flag:'🇲🇲',region:'asia',behavior:'觉得小朋友可爱就摸摸他的头',ok:false,hint:'你在蒲甘的寺庙旁遇到一群可爱的缅甸小朋友，他们好奇地看着你，你忍不住想摸摸最近那个孩子的头...',fact:'在缅甸，头部和泰国一样被认为是最神圣的。',learn:'缅甸深受佛教文化影响，头部是灵魂所在。即使是大人之间，摸别人的头也很不礼貌。同时脚也被视为最低贱的部位。'},

{country:'葡萄牙',flag:'🇵🇹',region:'europe',behavior:'在餐厅吃饭后把钱放在桌上就走',ok:false,hint:'你在里斯本的一家传统餐厅吃完烤鱼，准备把饭钱放在桌上直接离开，和在国内大排档一样...',fact:'在葡萄牙，给小费是表达感谢的重要方式。',learn:'葡萄牙餐厅一般期望留下5-10%的小费。虽然不像美国那么多，但完全不给会被认为不尊重服务员。最好把小费放在桌上而非递给服务员。'},

{country:'以色列',flag:'🇮🇱',region:'middleeast',behavior:'对朋友家的小孩不停夸赞',ok:false,hint:'你在特拉维夫的朋友家做客，他家的小孩非常可爱又聪明，你不停地夸赞"太漂亮了！太聪明了！"...',fact:'在以色列（及犹太文化中），过度夸赞小孩被认为会招来厄运。',learn:'犹太传统中有"邪眼"（evil eye）的说法，过度夸赞可能被认为会带来坏运气。以色列父母更喜欢低调的赞美，而不是夸张的吹捧。'},

{country:'秘鲁',flag:'🇵🇪',region:'americas',behavior:'做客时拒绝主人提供的食物',ok:false,hint:'你在库斯科的当地人家做客，主人热情地端上一盘当地特色菜——烤豚鼠（cuy），你看着不太敢吃想拒绝...',fact:'在秘鲁拒绝主人的食物是非常失礼的。',learn:'秘鲁人非常好客，拒绝食物会让主人难过。至少要尝一小口表示尊重。豚鼠（cuy）是安第斯山区的传统美食，已有数千年食用历史。'},

{country:'阿联酋',flag:'🇦🇪',region:'middleeast',behavior:'在公共场合和伴侣接吻',ok:false,hint:'你和另一半在迪拜购物中心逛街，情不自禁想亲吻一下表达爱意...',fact:'阿联酋法律禁止在公共场合展示亲密行为。',learn:'阿联酋虽然是国际化都市，但仍遵循伊斯兰法律。公共场合接吻、拥抱都可能被警告甚至拘留。在公共场合应保持克制。'},
{country:'古巴',flag:'🇨🇺',region:'americas',behavior:'在哈瓦那街头随意给当地人拍照',ok:false,hint:'你在哈瓦那老城漫步，看到一位穿着鲜艳传统服饰的古巴大妈，觉得画面太美了直接举起相机...',fact:'在古巴拍摄当地人需要先征得同意。',learn:'古巴人对拍照比较敏感，尤其是外国游客。很多人会要求付费才让你拍照。最好的做法是先微笑打招呼，征得同意后再拍。'},
{country:'爱尔兰',flag:'🇮🇪',region:'europe',behavior:'在酒吧里主动请全桌人喝酒',ok:true,hint:'你在都柏林的一家传统酒吧里和当地人聊得很开心，想请大家喝一杯表示友好...',fact:'爱尔兰酒吧文化中请客喝酒（buying a round）是很常见的社交行为。',learn:'爱尔兰酒吧有"轮流请酒"（rounds）的传统，如果你被请了一轮，下次轮到你时也应该请回去。不请回去会被认为不够意思。'},

{country:'越南',flag:'🇻🇳',region:'asia',behavior:'把筷子竖插在饭碗中央',ok:false,hint:'你在河内的一家粉店吃pho，随手把筷子插在了碗里...',fact:'和东亚多国一样，越南也忌讳竖插筷子。',learn:'在越南竖插筷子象征祭祀亡者的香火，和日韩中国的禁忌相同。用餐时应将筷子平放在碗边或桌面上。'},

const MAX_Q=6,SCORE_RIGHT=15,SCORE_WRONG=0,STREAK_BONUS=5;
let state={round:0,score:0,streak:0,maxStreak:0,correct:0,wrong:0,questions:[],history:[],totalQ:0,currentRegion:''};
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function goHome(){showScreen('startScreen')}
function renderRegionCards(){
  const grid=document.getElementById('regionGrid');
  let html='';
  for(const[key,r]of Object.entries(REGIONS)){
    const count=QUESTIONS.filter(q=>q.region===key).length;
    html+=`<div class="region-card" onclick="startGame('${key}')">
      <div class="rc-icon">${r.icon}</div>
      <div class="rc-name">${r.name}</div>
      <div class="rc-flags">${r.flags}</div>
      <div class="rc-count">随机抽 ${MAX_Q} 题</div>
    </div>`;
  }
  html+=`<div class="region-card region-all" onclick="startGame('all')">
    <div class="rc-icon">🌐</div>
    <div class="rc-name">全部地区</div>
    <div class="rc-flags">🌍🌏🌎</div>
    <div class="rc-count">随机抽 ${MAX_Q} 题</div>
  </div>`;
  grid.innerHTML=html;
}
renderRegionCards();
function startGame(region){
  const pool=region==='all'?QUESTIONS:QUESTIONS.filter(q=>q.region===region);
  const totalQ=Math.min(MAX_Q,pool.length);
  state={round:0,score:0,streak:0,maxStreak:0,correct:0,wrong:0,questions:shuffle(pool).slice(0,totalQ),history:[],totalQ,currentRegion:region};
  showScreen('gameScreen');showQuestion();
}
function showQuestion(){
  const q=state.questions[state.round];
  document.getElementById('roundInfo').textContent=`第 ${state.round+1}/${state.totalQ} 题`;
  document.getElementById('scoreDisplay').textContent=`🏆 ${state.score}`;
  updateStreak();
  document.getElementById('countryFlag').textContent=q.flag;
  document.getElementById('countryName').textContent=q.country;
  document.getElementById('behaviorText').textContent=`"${q.behavior}"`;
  document.getElementById('hintText').textContent=q.hint||'';
  document.getElementById('situationHint').style.display=q.hint?'flex':'none';
  document.getElementById('questionCard').className='question-card';
  document.getElementById('okBtn').disabled=false;document.getElementById('noBtn').disabled=false;
  document.getElementById('okBtn').className='answer-btn ok-btn';document.getElementById('noBtn').className='answer-btn no-btn';
  document.getElementById('answerBtns').style.display='flex';
  document.getElementById('explanationArea').innerHTML='';
  document.getElementById('nextBtnWrap').style.display='none';
}
function updateStreak(){const el=document.getElementById('streakDisplay');if(state.streak>=2){el.textContent=`🔥×${state.streak}`;el.className='streak-display active';setTimeout(()=>el.classList.remove('active'),400)}else{el.textContent='';el.className='streak-display'}}
function answer(userSaysOk){
  const q=state.questions[state.round];const isRight=(userSaysOk===q.ok);const card=document.getElementById('questionCard');
  document.getElementById('okBtn').disabled=true;document.getElementById('noBtn').disabled=true;
  if(userSaysOk){document.getElementById('okBtn').classList.add('chosen-ok')}else{document.getElementById('noBtn').classList.add('chosen-no')}
  if(isRight){state.correct++;state.streak++;if(state.streak>state.maxStreak)state.maxStreak=state.streak;const bonus=state.streak>=3?STREAK_BONUS*(state.streak-2):0;state.score+=SCORE_RIGHT+bonus;card.classList.add('correct-bg')}else{state.wrong++;state.streak=0;card.classList.add('wrong-bg')}
  state.history.push({q,isRight});document.getElementById('scoreDisplay').textContent=`🏆 ${state.score}`;updateStreak();
  const answerText=q.ok?'✅ 其实可以这样做':'❌ 这样做不行哦';
  document.getElementById('explanationArea').innerHTML=`<div class="explanation ${isRight?'correct':'wrong'}"><div class="result-label"><span class="icon">${isRight?'🎉':'💡'}</span>${isRight?'答对了！':'答错了～'} ${isRight?'':answerText}</div><div class="fact">${q.fact}</div><div class="learn">💡 ${q.learn}</div></div>`;
  document.getElementById('nextBtnWrap').style.display='block';
  document.getElementById('nextBtnWrap').querySelector('.btn').textContent=state.round<state.totalQ-1?'下一题 →':'查看结果 🎉';
}
function nextQuestion(){state.round++;if(state.round>=state.totalQ){showFinal();return}showQuestion()}
function showFinal(){
  showScreen('finalScreen');
  const pct=Math.round((state.correct/state.totalQ)*100);
  let rank='';
  if(pct>=90)rank='文化旅行家！你对这个地区的文化了如指掌。'
  else if(pct>=70)rank='资深旅客！大部分文化知识都掌握了，再补补冷门知识就完美了。'
  else if(pct>=50)rank='好奇背包客！有一些文化盲区，下次旅行前记得做做功课。'
  else rank='文化小白…建议出发前好好了解一下目的地的风俗习惯。'
  const regionName=state.currentRegion==='all'?'全部地区':REGIONS[state.currentRegion].name;
  document.getElementById('finalResult').innerHTML=`${state.correct}<span class="result-unit">/${state.totalQ}</span>`;
  document.getElementById('finalRegionTag').textContent=regionName;
  document.getElementById('finalRank').textContent=rank;
  const countries=[...new Set(state.history.map(h=>h.q.country))];
  const flags={};state.history.forEach(h=>{flags[h.q.country]=h.q.flag});
  let r='<div class="culture-title">🌏 这些国家你了解吗？</div>';
  countries.forEach((c,idx)=>{
    const facts=CULTURE[c]||[];
    const picked=shuffle(facts).slice(0,2);
    r+=`<div class="culture-country"><div class="culture-country-header"><span class="cc-flag">${flags[c]}</span><span class="cc-name">${c}文化风情</span></div>`;
    picked.forEach(f=>{r+=`<div class="culture-fact"><span class="fact-text">${f}</span></div>`});
    const travel=TRAVEL[c];
    if(travel){
      r+=`<div class="travel-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">🧳 出行清单 <span class="arrow">▾</span></div>`;
      r+=`<div class="travel-list">`;
      r+=`<div class="travel-module"><div class="travel-module-title">🛂 签证</div><p class="travel-text">${travel.visa}</p></div>`;
      r+=`<div class="travel-module"><div class="travel-module-title">📅 最佳时间</div><ul>${travel.bestTime.map(t=>'<li>'+t+'</li>').join('')}</ul></div>`;
      r+=`<div class="travel-module"><div class="travel-module-title">🎒 行李清单</div><ul>${travel.packing.map(t=>'<li>'+t+'</li>').join('')}</ul></div>`;
      r+=`<div class="travel-module"><div class="travel-module-title">💰 货币支付</div><ul>${travel.payment.map(t=>'<li>'+t+'</li>').join('')}</ul></div>`;
      r+=`<div class="travel-module"><div class="travel-module-title">🔌 实用贴士</div><ul>${travel.tips.map(t=>'<li>'+t+'</li>').join('')}</ul></div>`;
      r+=`</div>`;
    }
    r+='</div>';
  });
  document.getElementById('cultureArea').innerHTML=r;
}
</script>
</body>
</html>
